<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check-In Confirmed</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: #0f172a; color: #e2e8f0; min-height: 100vh;
         display: flex; align-items: center; justify-content: center; padding: 2rem; }
  .card { background: #1e293b; border-radius: 20px; padding: 2.5rem 2rem;
          text-align: center; max-width: 420px; border: 2px solid #22c55e; }
  .big  { font-size: 4rem; margin-bottom: 1rem; }
  h1   { font-size: 1.6rem; font-weight: 800; color: #22c55e; margin-bottom: 0.5rem; }
  p    { color: #94a3b8; line-height: 1.6; margin-bottom: 1rem; }
  .time { color: #64748b; font-size: 0.85rem; }
  a    { color: #3b82f6; text-decoration: none; }
</style>
</head>
<body>
<div class="card">
  <div class="big">✅</div>
  <h1>Check-In Received!</h1>
  <p>Your safety check-in has been recorded.<br>
     Angel and Scout are protected for another 48 hours. 🐾🐾</p>
  <p class="time">Recorded at {{ now }}</p>
  <p style="margin-top:1.5rem;"><a href="/">← Back to dashboard</a></p>
</div>
</body>
</html>
